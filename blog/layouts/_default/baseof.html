<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <link rel="stylesheet" href="{{ "css/tufte.css" | absURL }}">
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
    
        .container {
            max-width: 960px;
            margin: 0 auto;
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
        }
    
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 1rem;
        }
    
        @media screen and (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }
    
            .site-navigation {
                margin-top: 1.2rem;
                font-size: 1rem;
            }
        }
    
        main {
            padding: 1rem;
        }
        .footer-content {
            padding: 1rem;
        }

    </style>       
    {{ block "head" . }}{{ end }}
    </head>
    <body>
        <div class="container">
            <header>
                <div class="header-content">
                    <nav class="site-navigation">
                        <a href="{{ "/" | absURL }}">{{ .Site.Title }}</a>
                    </nav>
                    <nav class="site-navigation">
                        <a href="{{ "about" | absURL }}">About</a>
                    </nav>
                </div>
            </header>
            <div class="content-wrapper">
                <main>
                    {{ block "main" . }}{{ end }}
                </main>
            </div>
            <footer>
                <div class="footer-content">
                    &copy; {{ now.Format "2006" }} {{ .Site.Title }}. All rights reserved.
                </div>
            </footer>
        </div>
        {{ block "scripts" . }}{{ end }}
    </body>
    </html>
