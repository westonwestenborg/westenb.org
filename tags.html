---
layout: default
title: Tags
permalink: /tags/
---

<section class="tags-page">
  <h1>Tags</h1>

  <div class="tags-cloud">
    {% assign tags = site.tags | sort %}
    {% for tag in tags %}
      <a class="tag-cloud-item" href="{{ '/tags/' | relative_url }}{{ tag[0] | slugify }}/">
        {{ tag[0] }}<span class="count">({{ tag[1].size }})</span>
      </a>
    {% endfor %}
  </div>
</section>
